<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login - IPSTAUCLA</title>
    <link rel="stylesheet" href="/src/assets/css/style.css">
</head>

<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5;">
    <div class="card" style="width: 350px;">
        <h2 style="text-align: center;">Acceso IPSTAUCLA</h2>
        <form id="form-login">
    <input type="text" id="nombre_usuario" placeholder="Usuario" required>
    <input type="password" id="contrasena" placeholder="Contraseña" required>
    <button type="submit">Entrar</button>
</form>
        <p id="error-msg" style="color: red; text-align: center; display: none; margin-top: 10px;">Error en credenciales
        </p>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nombre_usuario = document.getElementById('user').value;
            const contrasena = document.getElementById('pass').value;

            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre_usuario, contrasena })
            });

            const data = await res.json();
            if (data.success) {
                window.location.href = '/index.html'; // Entra al sistema
            } else {
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('error-msg').innerText = data.message;
            }
        });
    </script>
</body>

</html>
